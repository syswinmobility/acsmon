name: notify

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine recipients
        id: setup
        run: |
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            echo "to=swmobi@syswin.co.kr" >> $GITHUB_OUTPUT
            echo "label=신규 버전" >> $GITHUB_OUTPUT
            echo "intro=정식 버전이 배포되었습니다" >> $GITHUB_OUTPUT
          else
            echo "to=acs@syswin.co.kr" >> $GITHUB_OUTPUT
            echo "label=테스트 버전" >> $GITHUB_OUTPUT
            echo "intro=새로운 테스트 버전이 배포되었습니다" >> $GITHUB_OUTPUT
          fi

      - name: Send notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtps.hiworks.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          from: SysACS CI <mobilityai@syswin.co.kr>
          to: ${{ steps.setup.outputs.to }}
          subject: "[ACSMon] ${{ steps.setup.outputs.label }} ${{ github.event.release.name }} 배포 안내"
          html_body: |
            <!DOCTYPE html>
            <html lang="ko">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>ACSMon 배포 안내</title>
            </head>
            <body style="margin:0; padding:0; background-color:#f4f6f8; font-family:'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f6f8;">
                <tr>
                  <td align="center" style="padding:32px 16px;">
                    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; max-width:600px;">
                      <tr>
                        <td style="background-color:#1f2937; padding:28px 32px;">
                          <div style="font-size:12px; color:#9ca3af; letter-spacing:1.5px; font-weight:600;">ACSMon RELEASE</div>
                          <div style="margin-top:6px; font-size:22px; color:#ffffff; font-weight:700;">${{ steps.setup.outputs.label }} 배포 안내</div>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:32px;">
                          <p style="margin:0 0 14px; font-size:15px; color:#374151; line-height:1.6;">안녕하세요 시스윈 모빌리티 ACS팀 입니다.</p>
                          <p style="margin:0 0 28px; font-size:15px; color:#374151; line-height:1.6;">
                            ACSMon Install <strong style="color:#111827;">${{ github.event.release.name }}</strong> ${{ steps.setup.outputs.intro }}.
                          </p>
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin:0 auto;">
                            <tr>
                              <td align="center" style="background-color:#2563eb; border-radius:6px;">
                                <a href="${{ github.event.release.html_url }}" style="display:inline-block; padding:13px 36px; color:#ffffff; text-decoration:none; font-size:15px; font-weight:600;">다운로드 페이지 열기</a>
                              </td>
                            </tr>
                          </table>
                          <p style="margin:18px 0 0; font-size:13px; color:#6b7280; text-align:center; line-height:1.6;">
                            페이지 하단 <strong style="color:#374151;">Assets</strong> 항목에서<br>
                            <code style="background-color:#f3f4f6; padding:2px 6px; border-radius:3px; font-size:12px; color:#111827;">ACSMon_Setup_*.exe</code> 파일을 다운로드해 주세요.
                          </p>
                          <hr style="border:0; border-top:1px solid #e5e7eb; margin:28px 0;">
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="padding:6px 0; font-size:13px; color:#6b7280; width:80px;">버전</td>
                              <td style="padding:6px 0; font-size:14px; color:#111827; font-weight:500;">${{ github.event.release.name }}</td>
                            </tr>
                            <tr>
                              <td style="padding:6px 0; font-size:13px; color:#6b7280;">분류</td>
                              <td style="padding:6px 0; font-size:14px; color:#111827; font-weight:500;">${{ steps.setup.outputs.label }}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="background-color:#f9fafb; padding:18px 32px; border-top:1px solid #e5e7eb;">
                          <p style="margin:0; font-size:12px; color:#9ca3af; line-height:1.6;">
                            본 메일은 ACSMon 자동 배포 시스템에서 발송된 안내 메일입니다.<br>
                            문의사항은 시스윈 모빌리티 ACS팀 담당자에게 연락 부탁드립니다.
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </body>
            </html>
